name: Failover Automatique — Tsitsi Store

on:
  # Vérification automatique toutes les 5 minutes
  schedule:
    - cron: '*/5 * * * *'

  # Déclenchement manuel depuis GitHub si besoin
  workflow_dispatch:
    inputs:
      force_action:
        description: 'Forcer une action manuellement'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - force-down
          - force-up

jobs:
  check_and_failover:
    runs-on: ubuntu-latest

    steps:
      # ============================================================
      # ÉTAPE 1 — Vérifier le statut via UptimeRobot API
      # ============================================================
      - name: Vérifier le statut du site via UptimeRobot
        id: check
        run: |
          RESPONSE=$(curl -s -X POST "https://api.uptimerobot.com/v2/getMonitors" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "api_key=${{ secrets.UPTIMEROBOT_API_KEY }}&format=json&logs=0")

          echo "Réponse UptimeRobot : $RESPONSE"

          STATUS=$(echo "$RESPONSE" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          monitors = data.get('monitors', [])
          if monitors:
              print(monitors[0]['status'])
          else:
              print('unknown')
          ")

          echo "Statut détecté : $STATUS"
          echo "status=$STATUS" >> $GITHUB_OUTPUT

          FORCE="${{ github.event.inputs.force_action }}"
          if [ "$FORCE" = "force-down" ]; then
            echo "status=9" >> $GITHUB_OUTPUT
          elif [ "$FORCE" = "force-up" ]; then
            echo "status=2" >> $GITHUB_OUTPUT
          fi

      # ============================================================
      # ÉTAPE 2 — Lire l'état actuel du DNS
      # ============================================================
      - name: Lire l'état actuel du DNS
        id: current_state
        run: |
          CURRENT_IP=$(dig +short ${{ secrets.NOIP_HOSTNAME }} | head -1)
          echo "IP actuelle : $CURRENT_IP"
          echo "current_ip=$CURRENT_IP" >> $GITHUB_OUTPUT

          GITHUB_IP="185.199.108.153"
          echo "github_ip=$GITHUB_IP" >> $GITHUB_OUTPUT

          if [ "$CURRENT_IP" = "$GITHUB_IP" ]; then
            echo "dns_state=vitrine" >> $GITHUB_OUTPUT
          else
            echo "dns_state=principal" >> $GITHUB_OUTPUT
          fi

      # ============================================================
      # ÉTAPE 3A — SITE DOWN → Basculer vers GitHub Pages
      # ============================================================
      - name: SITE DOWN — Basculer vers la vitrine
        if: |
          (steps.check.outputs.status == '9' || steps.check.outputs.status == '8') &&
          steps.current_state.outputs.dns_state == 'principal'
        run: |
          echo "Site DOWN — Basculement vers GitHub Pages..."
          GITHUB_IP="${{ steps.current_state.outputs.github_ip }}"

          RESPONSE=$(curl -s -u "${{ secrets.NOIP_USERNAME }}:${{ secrets.NOIP_PASSWORD }}" \
            "https://dynupdate.no-ip.com/nic/update?hostname=${{ secrets.NOIP_HOSTNAME }}&myip=${GITHUB_IP}")

          echo "Réponse No-IP : $RESPONSE"

          if echo "$RESPONSE" | grep -q "good\|nochg"; then
            echo "Basculement réussi vers GitHub Pages (${GITHUB_IP})"
          else
            echo "Erreur lors du basculement"
            exit 1
          fi

      # ============================================================
      # ÉTAPE 3B — SITE UP → Remettre vers le serveur principal
      # ============================================================
      - name: SITE UP — Remettre vers le serveur principal
        if: |
          steps.check.outputs.status == '2' &&
          steps.current_state.outputs.dns_state == 'vitrine'
        run: |
          echo "Site UP — Retour au serveur principal..."

          RESPONSE=$(curl -s -u "${{ secrets.NOIP_USERNAME }}:${{ secrets.NOIP_PASSWORD }}" \
            "https://dynupdate.no-ip.com/nic/update?hostname=${{ secrets.NOIP_HOSTNAME }}")

          echo "Réponse No-IP : $RESPONSE"

          if echo "$RESPONSE" | grep -q "good\|nochg"; then
            echo "DNS remis vers le serveur principal"
          else
            echo "Erreur lors du retour"
            exit 1
          fi

      # ============================================================
      # ÉTAPE 4 — Résumé
      # ============================================================
      - name: Résumé
        run: |
          echo "Statut UptimeRobot : ${{ steps.check.outputs.status }} (2=UP 8=SeemsDown 9=DOWN)"
          echo "État DNS           : ${{ steps.current_state.outputs.dns_state }}"
          echo "IP actuelle        : ${{ steps.current_state.outputs.current_ip }}"
          echo "Timestamp          : $(date)"
